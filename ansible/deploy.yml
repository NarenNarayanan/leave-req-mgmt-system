---
- name: Deploy Leave Management System
  hosts: webservers
  become: false

  vars:
    workspace: "/home/Naren/.jenkins/workspace/leave-mgmt-pipeline"
    backend_dir: "{{ workspace }}/backend"
    frontend_dir: "{{ workspace }}/frontend"

  tasks:

    - name: Write backend .env file
      copy:
        dest: "{{ backend_dir }}/.env"
        content: |
          PORT=5000
          NODE_ENV=production
          MONGO_URI=mongodb+srv://naren:naren123@cluster0.t2luovz.mongodb.net/leave_mgmt?retryWrites=true&w=majority&appName=Cluster0
          JWT_SECRET=leavemgmt_super_secret_key_2024
          JWT_EXPIRES_IN=7d
          CORS_ORIGIN=http://20.207.65.215:3000

    - name: Stop and delete backend PM2 process
      shell: pm2 delete leave-backend || true
      ignore_errors: true

    - name: Start backend with PM2
      shell: pm2 start server.js --name "leave-backend"
      args:
        chdir: "{{ backend_dir }}"

    - name: Wait for backend to start
      wait_for:
        port: 5000
        timeout: 30

    - name: Verify backend health
      uri:
        url: http://localhost:5000/api/v1/health
        return_content: yes
      register: health_check

    - name: Show backend status
      debug:
        msg: "Backend: {{ health_check.json.message }}"

    - name: Stop and delete frontend PM2 process
      shell: pm2 delete leave-frontend || true
      ignore_errors: true

    - name: Start frontend with PM2
      shell: pm2 start "serve -s build -l 3000" --name "leave-frontend"
      args:
        chdir: "{{ frontend_dir }}"

    - name: Wait for frontend to start
      wait_for:
        port: 3000
        timeout: 30

    - name: Save PM2 process list
      shell: pm2 save

    - name: Deployment summary
      debug:
        msg:
          - "✅ Frontend → http://20.207.65.215:3000"
          - "✅ Backend  → http://20.207.65.215:5000/api/v1/health"
