version: '3.8'

services:
  mongo:
    image: mongo:6
    container_name: leave_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - leave_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leave_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/leave_mgmt
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    networks:
      - leave_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: leave_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - leave_net

volumes:
  mongo_data:

networks:
  leave_net:
    driver: bridge
